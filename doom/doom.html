<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>DOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #000; overflow: hidden;
      }
      canvas#canvas {
        border: 0 none; width: 100vw; height: 100vh; display: block;
        outline: none;
      }
    </style>
  </head>
  
  <body>

    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>

    <script type='text/javascript'>
      var canvasElement = document.getElementById('canvas');

      window.addEventListener('click', function() {
        canvasElement.focus();
      });

      var Module = {
        noImageDecoding: true,
        preRun: [function() {
          canvasElement.focus();
        }],
        postRun: [function() {
          canvasElement.focus();
        }],
        print: (function() {
          return function(text) {
            text = Array.prototype.slice.call(arguments).join(' ');
            console.log(text);
          };
        })(),
        printErr: function(text) {
          text = Array.prototype.slice.call(arguments).join(' ');
          console.error(text);
        },
        canvas: (function() {
          canvasElement.addEventListener("webglcontextlost", function(e) { 
            alert('WebGL context lost. You will need to reload the page.'); 
            e.preventDefault(); 
          }, false);
          return canvasElement;
        })(),
        setStatus: function(text) {},
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
        },
        SDL_numSimultaneouslyQueuedBuffers: 1
      };

      window.onerror = function(event) {
        if (Module['setStatus']) {
          Module.setStatus('Exception thrown, see JavaScript console');
        }
      };
   </script>

   <script type="text/javascript">
    var Module;
    if (typeof Module === 'undefined') Module = eval('(function() { try { return Module || {} } catch(e) { return {} } })()');
    if (!Module.expectedDataFileDownloads) {
      Module.expectedDataFileDownloads = 0;
      Module.finishedDataFileDownloads = 0;
    }
    Module.expectedDataFileDownloads++;

    (function() {
        var PACKAGE_PATH = "";
        var PACKAGE_NAME = 'doom.exe.data';
        var REMOTE_PACKAGE_NAME = PACKAGE_PATH + PACKAGE_NAME;
        var REMOTE_PACKAGE_SIZE = 13731014;
      
        function fetchRemotePackage(packageName, packageSize, callback) {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', packageName, true);
          xhr.responseType = 'arraybuffer';
          xhr.onload = function() { callback(xhr.response); };
          xhr.send(null);
        };
      
        var fetched = null, fetchedCallback = null;
        fetchRemotePackage(REMOTE_PACKAGE_NAME, REMOTE_PACKAGE_SIZE, function(data) {
          if (fetchedCallback) {
            fetchedCallback(data);
            fetchedCallback = null;
          } else {
            fetched = data;
          }
        });
        
        function runWithFS() {
            function DataRequest(start, end) {
              this.start = start;
              this.end = end;
            }
            DataRequest.prototype = {
              requests: {},
              open: function(mode, name) {
                this.name = name;
                this.requests[name] = this;
                Module['addRunDependency']('fp ' + this.name);
              },
              send: function() {},
              onload: function() {
                var byteArray = this.byteArray.subarray(this.start, this.end);
                this.finish(byteArray);
              },
              finish: function(byteArray) {
                var that = this;
                Module['FS_createPreloadedFile'](this.name, null, byteArray, true, true, function() {
                  Module['removeRunDependency']('fp ' + that.name);
                }, function() {
                  Module.printErr('Preloading file ' + that.name + ' failed');
                }, false, true);
                this.requests[this.name] = null;
              },
            };
            
            new DataRequest(0, 67).open('GET', '/MODEM.NUM');
            new DataRequest(67, 2603).open('GET', '/DWANGO.STR');
            new DataRequest(2603, 6008).open('GET', '/MODEM.STR');
            new DataRequest(6008, 82906).open('GET', '/DMFAQ66C.TXT');
            new DataRequest(82906, 87595).open('GET', '/HELPME.TXT');
            new DataRequest(87595, 108532).open('GET', '/DM.EXE');
            new DataRequest(108532, 12516824).open('GET', '/DOOM.WAD');
            new DataRequest(12516824, 12551396).open('GET', '/DMFAQ66D.TXT');
            new DataRequest(12551396, 12556013).open('GET', '/ORDER.FRM');
            new DataRequest(12556013, 12576270).open('GET', '/SERSETUP.EXE');
            new DataRequest(12576270, 12577041).open('GET', '/DEFAULT.CFG');
            new DataRequest(12577041, 12587664).open('GET', '/DWANGO.DOC');
            new DataRequest(12587664, 12609653).open('GET', '/README.TXT');
            new DataRequest(12609653, 12729854).open('GET', '/DMFAQ66A.TXT');
            new DataRequest(12729854, 13445347).open('GET', '/DOOM.EXE');
            new DataRequest(13445347, 13585941).open('GET', '/DMFAQ66B.TXT');
            new DataRequest(13585941, 13603992).open('GET', '/IPXSETUP.EXE');
            new DataRequest(13603992, 13677630).open('GET', '/DWANGO.EXE');
            new DataRequest(13677630, 13677885).open('GET', '/DWANGO.SRV');
            new DataRequest(13677885, 13684282).open('GET', '/DM.DOC');
            new DataRequest(13684282, 13684349).open('GET', '/MODEM.CFG');
            new DataRequest(13684349, 13731014).open('GET', '/SETUP.EXE');

            function processPackageData(arrayBuffer) {
              Module.finishedDataFileDownloads++;
              var byteArray = new Uint8Array(arrayBuffer);
              DataRequest.prototype.byteArray = byteArray;
              
              DataRequest.prototype.requests["/MODEM.NUM"].onload();
              DataRequest.prototype.requests["/DWANGO.STR"].onload();
              DataRequest.prototype.requests["/MODEM.STR"].onload();
              DataRequest.prototype.requests["/DMFAQ66C.TXT"].onload();
              DataRequest.prototype.requests["/HELPME.TXT"].onload();
              DataRequest.prototype.requests["/DM.EXE"].onload();
              DataRequest.prototype.requests["/DOOM.WAD"].onload();
              DataRequest.prototype.requests["/DMFAQ66D.TXT"].onload();
              DataRequest.prototype.requests["/ORDER.FRM"].onload();
              DataRequest.prototype.requests["/SERSETUP.EXE"].onload();
              DataRequest.prototype.requests["/DEFAULT.CFG"].onload();
              DataRequest.prototype.requests["/DWANGO.DOC"].onload();
              DataRequest.prototype.requests["/README.TXT"].onload();
              DataRequest.prototype.requests["/DMFAQ66A.TXT"].onload();
              DataRequest.prototype.requests["/DOOM.EXE"].onload();
              DataRequest.prototype.requests["/DMFAQ66B.TXT"].onload();
              DataRequest.prototype.requests["/IPXSETUP.EXE"].onload();
              DataRequest.prototype.requests["/DWANGO.EXE"].onload();
              DataRequest.prototype.requests["/DWANGO.SRV"].onload();
              DataRequest.prototype.requests["/DM.DOC"].onload();
              DataRequest.prototype.requests["/MODEM.CFG"].onload();
              DataRequest.prototype.requests["/SETUP.EXE"].onload();
              Module['removeRunDependency']('datafile_doom');
            };
            
            Module['addRunDependency']('datafile_doom');
            if (fetched) {
              processPackageData(fetched);
              fetched = null;
            } else {
              fetchedCallback = processPackageData;
            }
        }
        
        if (Module['calledRun']) {
          runWithFS();
        } else {
          if (!Module['preRun']) Module['preRun'] = [];
          Module["preRun"].push(runWithFS);
        }
    })();

    Module['arguments'] = [ '-conf', './dosbox.conf', './DOOM.EXE' ];
   </script>
   <script async type="text/javascript" src="https://js-dos.com/dosbox.js"></script>
</body>
</html>
